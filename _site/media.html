<script>
  // Mobile menu
  document.querySelector('.menu-toggle').addEventListener('click', function() {
    const nav = document.getElementById('site-nav');
    const expanded = this.getAttribute('aria-expanded') === 'true';
    this.setAttribute('aria-expanded', !expanded);
    nav.classList.toggle('open');
    this.classList.toggle('open');
  });

  // Dark mode toggle
  (function() {
    const toggle = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('theme');
    if (saved === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      toggle.textContent = '☀️';
    }
    toggle.addEventListener('click', function() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (isDark) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
        this.textContent = '🌙';
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
        this.textContent = '☀️';
      }
    });
  })();
</script>

  <main class="site-main">
    <div class="container">
  <h1 class="page-title">מדיה</h1>
  <h3>איזור זה עדיין בעריכה...</h3>

  <section class="section fade-in">
    <h2 class="section-title">שיעורי וידאו</h2>
    <div class="media-grid" id="video-container">
      <!-- תוכן יוזרם מ-JSON -->
    </div>
  </section>

  <section class="section media-list fade-in">
    <h2 class="section-title">שיעורים נוספים</h2>
    <div id="links-container">
      <!-- תוכן יוזרם מ-JSON -->
    </div>
  </section>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  // טעינת JSON
  fetch('/torani/assets/data/media/media.json')
    .then(response => response.json())
    .then(data => {

      // ===== וידאו =====
      const videoContainer = document.getElementById('video-container');

      data.videos.forEach(video => {
        const card = document.createElement('div');
        card.className = 'media-card';

        card.innerHTML = `
          <iframe src="https://www.youtube.com/embed/${video.youtube_id}"
                  title="${video.title}"
                  allowfullscreen
                  loading="lazy"></iframe>
          <div class="media-card__body">
            <h3 class="media-card__title">${video.title}</h3>
          </div>
        `;

        videoContainer.appendChild(card);
      });

      // ===== קישורים =====
      const linksContainer = document.getElementById('links-container');

      data.links.forEach(link => {
        const a = document.createElement('a');
        a.href = link.url;
        a.target = '_blank';
        a.rel = 'noopener';
        a.className = 'media-list-item';
        a.textContent = link.title;

        linksContainer.appendChild(a);
      });

    });

  // אנימציות (נשאר כמו שהיה)
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.15 });

  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

});
</script>
